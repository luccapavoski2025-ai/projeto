name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Run backend tests
        run: |
          if [ -d backend/tests ] || grep -R "pytest" -q backend || true; then
            pytest -q
          else
            echo "No backend tests found"
          fi

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: frontend
        run: |
          if [ -f package.json ]; then npm ci; else echo "No frontend package.json"; fi
      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package.json ]; then npm run build --if-present; else echo "No frontend to build"; fi
